<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Charity Donation Bridge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
    </nav>
    <header>
        <h1>Charity Donation Bridge</h1>
        <p>Aapki choti si madad, kisi ki zindagi badal sakti hai.</p>
    </header>
    <main class="donation-grid">
        <div class="card">
            <h3>Food</h3>
            <p>Zaroorat-mand logon tak khana pohanchayein.</p>
            <button onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSes-HuNc6cT1qi0cGvtozshoR0ov3nfWvR7hFvBBORKJCKd4w/viewform?usp=sharing', '_blank')">Donate Food</button>
        </div>
        <div class="card">
            <h3>Money</h3>
            <p>Apni raqam seedha JazzCash ke zariye donate karein.</p>
            <button onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSes-HuNc6cT1qi0cGvtozshoR0ov3nfWvR7hFvBBORKJCKd4w/viewform?usp=sharing', '_blank')">Donate Money</button>
        </div>
        <div class="card">
            <h3>Clothes</h3>
            <p>Naye ya saaf purane kapray donate karein.</p>
            <button onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSes-HuNc6cT1qi0cGvtozshoR0ov3nfWvR7hFvBBORKJCKd4w/viewform?usp=sharing', '_blank')">Donate Clothes</button>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 Charity Donation Bridge | BS CS Project</p>
    </footer>
</body>
</html>
